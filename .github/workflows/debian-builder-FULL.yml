name: Build Debian kernel - FULL

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight (UTC)
  workflow_call:
    inputs:
      _cpusched:
        required: true
        type: string
        default: "pds" # Optional: set a default if running via schedule

env:
  _processor_opt: "x86-64"
  _distro: "Debian"
  _git_mirror: "gregkh"
  _logging_use_script: "no"
  _install_after_building: "no"
  _debugdisable: "true"
  _noccache: "true"
  _STRIP: "true"
  _compiler: "llvm"
  _lto_mode: "full"
  _kernel_on_diet: "false"
  _kernel_work_folder: "/tmp"
  _kernel_source_folder: "/tmp"
  _modprobeddb_db_path: ${{ github.workspace }}/modprobed.db
  _nofallback: "true"

jobs:
  build-kernel:
    runs-on: ubuntu-latest # Note: github doesn't have a 'debian-latest' runner; usually 'ubuntu-latest' is used to build Debian pkgs
    env:
      _cpusched: ${{ inputs._cpusched || 'pds' }} # Uses input or fallback for schedule runs

    steps:
      - name: Checkout linux-tkg
        uses: actions/checkout@v4

      - name: Fetch latest apt database
        run: sudo apt update

      - name: Install deps and compile kernel
        run: yes '' | ./install.sh install

      - name: Cleanup useless DEB files
        run: rm -rf DEBS/*dbg*.deb DEBS/*libc-dev*.deb

      - name: Rename kernel config
        run: mv kernelconfig.new kernelconfig.debian.${{ env._cpusched }}.txt

      - name: Generate Release Tag
        id: tag
        run: echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "${{ env._cpusched }} Debian Full Kernel Build"
          files: |
            DEBS/*.deb
            kernelconfig*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-kernel-packages-${{ env._cpusched }}
          path: |
            DEBS/*.deb
            kernelconfig*.txt
